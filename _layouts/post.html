---
layout: default
---

<article class="post">

  <!-- Display date prominently -->
  <p class="post-meta" style="font-size: 1.1em; margin-top: -20px; margin-bottom: 30px; color: #666;">{{ page.date | date: "%B %d, %Y" }}</p>
  
  <div class="post-content">
    {{ content }}
  </div>

  <!-- Back to Blog link at the bottom -->
  <p class="back-link" style="margin-top: 30px;">
    <a href="{{ '/blog/' | relative_url }}" style="text-decoration: none; color: #007bff; font-weight: bold;">← Back to Blog</a>
  </p>
</article>
